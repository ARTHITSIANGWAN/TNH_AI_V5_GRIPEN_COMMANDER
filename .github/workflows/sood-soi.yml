name: TNH_AI_SOOD_SOI_UNIFIER

on:
  workflow_dispatch:

jobs:
  push_to_empire:
    name: Sync Source Code to Core Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Build Deployment Bundle Artifacts
        run: |
          mkdir -p deployment_bundle
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ deployment_bundle/

      - name: Execute Remote Synchronization and Deployment
        env:
          GITHUB_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          git config --global user.name "TNH-AI-JOD-L5"
          git config --global user.email "jod@tnh.ai"
          
          # Clone target orchestrator repository
          git clone "https://x-access-token:${GITHUB_PAT_TOKEN}@github.com/ARTHITSIANGWAN/TNH-AI-9th-Era-of-Fire-AI-Orchestra-Mastering-Go-Engine-" destination_repository
          
          # Establish deterministic source folder mapping
          SOURCE_REPOSITORY_NAME=$(basename "$GITHUB_REPOSITORY")
          TARGET_DEPLOYMENT_DIRECTORY="destination_repository/from_${SOURCE_REPOSITORY_NAME}"
          
          mkdir -p "$TARGET_DEPLOYMENT_DIRECTORY"
          cp -rv deployment_bundle/* "$TARGET_DEPLOYMENT_DIRECTORY/"
          
          # Commit and push updates to remote infrastructure
          cd destination_repository
          git add .
          git commit -m "Level 5 Automated Sync: Integrated payload from ${SOURCE_REPOSITORY_NAME} into orchestration pipeline." || echo "Deployment Status: No structural changes detected."
          git push
          
